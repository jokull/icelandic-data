name: Source health

# Probes upstream data sources for the smallest stable contract each script
# depends on. Deliberately NOT a fetch run: no full datasets, no PDF
# extraction, no geodata rebuilds.
#
# Lightweight probes run daily. Browser probes are manual-only — see the job
# comment for why.

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      browser:
        description: "Also run browser/Playwright probes"
        type: boolean
        default: false

concurrency:
  group: source-health
  cancel-in-progress: true

# contents: write is for appending an observation to the health-history branch.
# A push using GITHUB_TOKEN does not trigger further workflow runs, so this
# cannot loop.
permissions:
  contents: write

jobs:
  lightweight:
    name: Lightweight probes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level so the ping step can test it in `if:` — the secrets context is
    # not available there, but the env context is. Unset secret -> empty string
    # -> the ping step skips, and everything else still works.
    env:
      HEALTH_PING_URL: ${{ secrets.HEALTH_PING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Two lanes, because pytest models pass/fail but health has three states.
      # Required = hard invariants, gates the job. Degraded = staleness and
      # known-soft probes, reported but never wakes anyone.
      - name: Required probes
        id: required
        continue-on-error: true
        run: |
          uv run pytest -m "health and not browser and not degraded_ok" \
            --junit-xml=health-required.xml

      - name: Degraded probes
        id: degraded
        continue-on-error: true
        run: |
          uv run pytest -m "health and degraded_ok" \
            --junit-xml=health-degraded.xml

      # Today's snapshot. Reported for the eye, but it does NOT gate — a lone
      # red is a flake until history says otherwise. See the verdict step.
      - name: Report today
        continue-on-error: true
        run: |
          uv run python scripts/health_summary.py \
            --required health-required.xml \
            --degraded health-degraded.xml \
            --json health-results.json \
            --markdown "$GITHUB_STEP_SUMMARY"

      # Git scraping: the health-history branch is the time-series database.
      # Artifacts cannot do this job — they expire after 90 days.
      #
      # Not shallow: pushing from a shallow clone can be rejected. The branch
      # holds one small file, so a full clone of it is cheap regardless.
      - name: Fetch history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --quiet --single-branch --branch health-history "$REMOTE" .history 2>/dev/null; then
            echo "history: $(wc -l < .history/history.jsonl) observation(s) so far"
          else
            echo "history: bootstrapping health-history branch"
            mkdir -p .history
            git -C .history init --quiet -b health-history
            git -C .history remote add origin "$REMOTE"
          fi

      - name: Record observation
        id: record
        run: |
          uv run python scripts/health_summary.py \
            --required health-required.xml \
            --degraded health-degraded.xml \
            --history .history/history.jsonl \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            > /dev/null

      # Push before judging, so a gating verdict never costs us the datapoint.
      # These commits are also genuine repository activity, which plausibly
      # holds off the 60-day auto-disable of scheduled workflows — GitHub does
      # not define "activity", so this is a side benefit, not the safety net.
      # The safety net is a dead-man's-switch (see below).
      - name: Commit history
        run: |
          set -euo pipefail
          cd .history
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.jsonl
          git commit --quiet -m "health: $(date -u +%Y-%m-%dT%H:%MZ)" || {
            echo "nothing to commit"; exit 0;
          }
          for attempt in 1 2 3; do
            if git push --quiet origin health-history 2>/dev/null; then
              echo "pushed"; exit 0
            fi
            echo "push rejected (attempt $attempt) — rebasing on remote"
            git pull --rebase --quiet origin health-history || true
          done
          echo "::warning::could not push health history after 3 attempts"

      # The gate. Judges over the window, not over today:
      #   dead   = 3+ consecutive failures
      #   broken = 2+ consecutive structural failures (the skill needs updating)
      #   flaky  = recovered on its own; recorded, not actionable
      - name: Verdict
        run: |
          uv run python scripts/health_verdict.py \
            --history .history/history.jsonl \
            --window-days 30 \
            --json health-verdicts.json \
            --markdown "$GITHUB_STEP_SUMMARY"

      # Dead-man's-switch. GitHub cannot alert you that GitHub stopped: scheduled
      # runs can be dropped silently, and scheduled workflows in public repos are
      # auto-disabled after 60 days of repository inactivity. Both fail closed and
      # quiet, so the absence of a run produces no failure and no email. Only
      # something outside GitHub can notice that.
      #
      # Inactive until HEALTH_PING_URL is set as a repo secret; until then this
      # step simply skips. Point it at anything that alerts when pings STOP
      # (healthchecks.io free tier, or a cron on the mac-mini):
      #   gh secret set HEALTH_PING_URL --body "https://hc-ping.com/<uuid>"
      #
      # Deliberately NOT `if: success()`. This switch answers "is the monitor
      # alive?", not "are the sources healthy?". Gating on success would let a
      # legitimately dead source silence the switch — conflating "a source is
      # down" (already reported, with detail) with "the monitor stopped" (nobody
      # is watching at all). It fires whenever we actually observed and recorded,
      # whatever the verdict; and it does not fire when we never got that far,
      # which is exactly when you want the silence to be noticed.
      - name: Ping dead-man's-switch
        if: always() && steps.record.outcome == 'success' && env.HEALTH_PING_URL != ''
        run: curl -fsS --retry 3 --max-time 10 "$HEALTH_PING_URL" > /dev/null

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-results
          path: |
            health-results.json
            health-verdicts.json
            health-*.xml
          retention-days: 30

  # Not scheduled, by design. These probes drive Power BI / Tableau / Playwright
  # from a datacenter IP, where bot detection and headless fingerprinting cause
  # failures that say nothing about whether the source is actually up. Running
  # them nightly would mostly teach us that GitHub's IP ranges are blocked. Run
  # on demand when a dashboard scraper is suspect.
  browser:
    name: Browser probes (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.browser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Chromium
        run: uv run playwright install --with-deps chromium

      - name: Browser probes
        continue-on-error: true
        run: uv run pytest -m "health and browser" --junit-xml=health-browser.xml

      - name: Report
        run: |
          uv run python scripts/health_summary.py \
            --required health-browser.xml \
            --json health-browser.json \
            --markdown "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-browser
          path: |
            health-browser.json
            health-browser.xml
          retention-days: 30
